/* ========== AUDIO ENGINE ========== */
let audioCtx=null,masterGain=null,musicGain=null,sfxGain=null;
let currentTrack=null,musicPlaying='',musicEnabled=1,sfxEnabled=1;
function initAudio(){
if(audioCtx)return;
audioCtx=new(window.AudioContext||window.webkitAudioContext)();
masterGain=audioCtx.createGain();masterGain.gain.value=0.4;masterGain.connect(audioCtx.destination);
musicGain=audioCtx.createGain();musicGain.gain.value=0.3;musicGain.connect(masterGain);
sfxGain=audioCtx.createGain();sfxGain.gain.value=0.5;sfxGain.connect(masterGain);
}
function resumeAudio(){if(audioCtx&&audioCtx.state==='suspended')audioCtx.resume();}

// Note frequencies
const NOTES={C3:130.81,D3:146.83,E3:164.81,F3:174.61,G3:196,A3:220,B3:246.94,
C4:261.63,D4:293.66,E4:329.63,F4:349.23,G4:392,A4:440,B4:493.88,
C5:523.25,D5:587.33,E5:659.25,F5:698.46,G5:784,A5:880,B5:987.77,
C6:1046.5,D6:1174.7,E6:1318.5,
Db4:277.18,Eb4:311.13,Gb4:369.99,Ab4:415.3,Bb4:466.16,
Db5:554.37,Eb5:622.25,Gb5:739.99,Ab5:830.61,Bb5:932.33};

function playNote(freq,dur,type,gain,dest,delay){
if(!audioCtx)return;
let t=audioCtx.currentTime+(delay||0);
let osc=audioCtx.createOscillator();
let g=audioCtx.createGain();
osc.type=type||'square';
osc.frequency.setValueAtTime(freq,t);
g.gain.setValueAtTime(gain||0.15,t);
g.gain.exponentialRampToValueAtTime(0.001,t+dur);
osc.connect(g);g.connect(dest||sfxGain);
osc.start(t);osc.stop(t+dur);
}

// === SFX ===
function sfxJump(){
if(!sfxEnabled||!audioCtx)return;
playNote(400,0.08,'square',0.12);
playNote(600,0.1,'square',0.1,null,0.05);

}
function sfxCollect(){
if(!sfxEnabled||!audioCtx)return;
playNote(880,0.06,'square',0.1);
playNote(1100,0.06,'square',0.1,null,0.06);
playNote(1320,0.1,'square',0.08,null,0.12);
}
function sfxHit(){
if(!sfxEnabled||!audioCtx)return;
let t=audioCtx.currentTime;
let osc=audioCtx.createOscillator();let g=audioCtx.createGain();
osc.type='sawtooth';osc.frequency.setValueAtTime(200,t);
osc.frequency.exponentialRampToValueAtTime(50,t+0.3);
g.gain.setValueAtTime(0.2,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.3);
osc.connect(g);g.connect(sfxGain);osc.start(t);osc.stop(t+0.35);
}
function sfxDeath(){
if(!sfxEnabled||!audioCtx)return;
[200,180,150,120,90].forEach((f,i)=>{playNote(f,0.15,'sawtooth',0.12,null,i*0.1);});
}
function sfxWave(){
if(!sfxEnabled||!audioCtx)return;
[NOTES.C5,NOTES.E5,NOTES.G5,NOTES.C6].forEach((f,i)=>{playNote(f,0.15,'square',0.1,null,i*0.1);});
}
function sfxCombo(){
if(!sfxEnabled||!audioCtx)return;
playNote(660,0.05,'square',0.08);
playNote(880,0.08,'square',0.1,null,0.04);
}
function sfxButton(){

playNote(500,0.04,'square',0.06);

// === MUSIC SEQUENCER ===
let seqTimer=null,seqStep=0,seqPattern=[],seqBPM=140,seqPlaying=0;

function stopMusic(){
seqPlaying=0;
if(seqTimer){clearInterval(seqTimer);seqTimer=null;}
musicPlaying='';
}

function playMusic(name){
if(!musicEnabled||!audioCtx)return;
if(musicPlaying===name)return;
stopMusic();
musicPlaying=name;
seqStep=0;
if(name==='menu')seqPattern=menuPattern();
else if(name==='play')seqPattern=gamePattern();
else if(name==='gameover')seqPattern=gameoverPattern();
else if(name==='shop')seqPattern=shopPattern();
else return;
seqPlaying=1;
let interval=60000/seqBPM/4;
seqTimer=setInterval(()=>{
if(!seqPlaying||!musicEnabled){stopMusic();return;}
let step=seqPattern[seqStep%seqPattern.length];
if(step){
if(step.m)playNote(step.m,step.d||0.15,'square',0.08,musicGain);
if(step.b)playNote(step.b,step.d||0.2,'triangle',0.1,musicGain);
if(step.h){let n=audioCtx.createOscillator();let g=audioCtx.createGain();n.type='square';n.frequency.value=step.h;g.gain.setValueAtTime(0.03,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.05);n.connect(g);g.connect(musicGain);n.start();n.stop(audioCtx.currentTime+0.06);}
}
seqStep++;
},interval);
}

/* ========== STREAK & DAILIES ========== */
function todayStr(){return new Date().toISOString().slice(0,10);}
function checkStreak(){let t=todayStr();if(save.lastPlay===t)return;let y=new Date();y.setDate(y.getDate()-1);if(save.lastPlay===y.toISOString().slice(0,10)){save.streak++;}else if(save.lastPlay!==t){save.streak=1;}save.lastPlay=t;TS();}
function streakReward(){let s=save.streak;if(s>=7)return{shoes:100,label:'Day 7: 100 shoes!'};if(s>=3)return{shoes:30,label:'Day 3: 30 shoes!'};return{shoes:10,label:'Day '+s+': 10 shoes'};}

const DAILY_POOL=[
{desc:'Score 200+ in one run',check:s=>s>=200},
{desc:'Reach wave 3',check:(s,w)=>w>=3},
{desc:'Reach wave 5',check:(s,w)=>w>=5},
{desc:'Collect 15 horseshoes',check:(s,w,h)=>h>=15},
{desc:'Collect 30 horseshoes',check:(s,w,h)=>h>=30},
{desc:'Score 500+ in one run',check:s=>s>=500},
];
function genDailies(){
let t=todayStr();
if(save.dailies&&save.dailies.date===t)return;
let pool=[...DAILY_POOL];
let picks=[];
for(let i=0;i<3&&pool.length;i++){let idx=Math.floor(Math.random()*pool.length);picks.push(pool.splice(idx,1)[0]);}
save.dailies={date:t,tasks:picks.map(p=>p.desc)};
save.dailyDone=[0,0,0];
TS();
}
function checkDailies(sc,wv,sh){
if(!save.dailies)return;
save.dailies.tasks.forEach((desc,i)=>{
if(save.dailyDone[i])return;
let d=DAILY_POOL.find(p=>p.desc===desc);
if(d&&d.check(sc,wv,sh)){save.dailyDone[i]=1;save.totalShoes+=25;}
});TS();
}

/* ========== XP & LEVEL ========== */
function addXP(amount){
save.xp+=amount;
let needed=save.level*100;
while(save.xp>=needed){save.xp-=needed;save.level++;needed=save.level*100;save.bpLevel++;}
TS();
}

function px(x,y,w,h,c){ctx.fillStyle=c;ctx.fillRect(Math.round(x),Math.round(y),w,h);}
function drawPixelHeart(x,y,sz,f){let p=sz/8,c=f?'#E24B4A':'#501313',hi=f?'#F09595':'#501313';if(f){px(x+p,y,p*2,p,c);px(x+p*4,y,p*2,p,c);px(x,y+p,p*7,p,c);px(x,y+p*2,p*7,p,c);px(x+p,y+p*3,p*5,p,c);px(x+p*2,y+p*4,p*3,p,c);px(x+p*3,y+p*5,p,p,c);px(x+p,y,p,p,hi);px(x+p,y+p,p,p,hi);}else{px(x+p,y,p*2,p,c);px(x+p*4,y,p*2,p,c);px(x,y+p,p,p,c);px(x+p*3,y+p,p,p,c);px(x+p*6,y+p,p,p,c);px(x,y+p*2,p,p,c);px(x+p*6,y+p*2,p,p,c);px(x+p,y+p*3,p,p,c);px(x+p*5,y+p*3,p,p,c);px(x+p*2,y+p*4,p,p,c);px(x+p*4,y+p*4,p,p,c);px(x+p*3,y+p*5,p,p,c);}}
function rr(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);}
function btn(x,y,w,h,text,col,tcol,id,fs){let hov=mouseX>=x&&mouseX<=x+w&&mouseY>=y&&mouseY<=y+h;ctx.fillStyle=col;ctx.globalAlpha=hov?0.85:1;rr(x,y,w,h,5);ctx.fill();ctx.globalAlpha=1;ctx.fillStyle=tcol;ctx.font=(fs||'8px')+' "Press Start 2P",monospace';ctx.textAlign='center';ctx.fillText(text,x+w/2,y+h/2+3);ctx.textAlign='left';buttons.push({x,y,w,h,id});}

// Dusty = purple shopkeeper, Blaze = orange guide
function drawNPC(x,y,type,scale){
let s=scale||1,bx=x,by=y;
let col=type==='dusty'?{body:'#9B59B6',bodyD:'#7A3E94',bodyL:'#B070D0',sn:'#C890E0',mane:'#DDA0DD',tail:'#DDA0DD',hat:'#6B4423',hatB:'#8B6843'}:{body:'#E67E22',bodyD:'#C06010',bodyL:'#F09838',sn:'#F0B060',mane:'#FFD700',tail:'#FFD700',hat:null};
let bob=Math.sin(Date.now()*0.002)*2;
by+=bob;
// Legs
px(bx+4*s,by+18*s,3*s,8*s,col.bodyD);px(bx+8*s,by+18*s,3*s,8*s,col.bodyD);
px(bx+16*s,by+18*s,3*s,8*s,col.bodyD);px(bx+20*s,by+18*s,3*s,8*s,col.bodyD);
// Hooves
px(bx+3*s,by+24*s,5*s,2*s,'#3A2510');px(bx+7*s,by+24*s,5*s,2*s,'#3A2510');
px(bx+15*s,by+24*s,5*s,2*s,'#3A2510');px(bx+19*s,by+24*s,5*s,2*s,'#3A2510');
// Tail
let tB=Math.sin(Date.now()*0.0015)*2*s;
px(bx-2*s,by+6*s+tB,3*s,4*s,col.tail);px(bx-4*s,by+8*s+tB,3*s,6*s,col.tail);
px(bx-6*s,by+12*s+tB,3*s,5*s,col.tail);
// Body
px(bx+2*s,by+6*s,22*s,14*s,col.body);px(bx+4*s,by+8*s,18*s,10*s,col.bodyL);
// Neck + head
px(bx+20*s,by+2*s,8*s,10*s,col.body);
px(bx+24*s,by-2*s,10*s,10*s,col.body);px(bx+26*s,by,6*s,6*s,col.bodyL);
px(bx+30*s,by-4*s,8*s,6*s,col.body);px(bx+32*s,by-2*s,6*s,4*s,col.bodyL);
// Snout
px(bx+34*s,by,4*s,3*s,col.sn);px(bx+36*s,by+2*s,3*s,2*s,col.sn);
// Eye
px(bx+30*s,by-2*s,2*s,2*s,'#000');px(bx+31*s,by-2*s,1*s,1*s,'#FFF');
// Ears
px(bx+26*s,by-6*s,3*s,5*s,col.body);px(bx+30*s,by-8*s,3*s,5*s,col.body);
// Mane
px(bx+24*s,by-4*s,3*s,5*s,col.mane);px(bx+20*s,by-2*s,4*s,4*s,col.mane);
px(bx+18*s,by,3*s,5*s,col.mane);px(bx+22*s,by+2*s,3*s,4*s,col.mane);
// Dusty's cowboy hat
if(type==='dusty'){
px(bx+22*s,by-12*s,16*s,3*s,col.hat);
px(bx+25*s,by-18*s,10*s,6*s,col.hat);
px(bx+26*s,by-17*s,8*s,4*s,col.hatB);
}
// Blaze's bandana
if(type==='blaze'){
px(bx+28*s,by+2*s,10*s,3*s,'#E24B4A');
px(bx+34*s,by+4*s,4*s,4*s,'#E24B4A');
px(bx+36*s,by+6*s,3*s,3*s,'#CC2222');
}
}

function drawSpeechBubble(x,y,text,tailSide,col){
ctx.font='5px "Press Start 2P",monospace';
let tw=ctx.measureText(text).width+16;
let bx=tailSide==='left'?x:x-tw;
let by=y;
// Bubble
ctx.fillStyle=col||'#FFF';
rr(bx,by,tw,20,6);ctx.fill();
ctx.strokeStyle='#333';ctx.lineWidth=1;rr(bx,by,tw,20,6);ctx.stroke();
// Tail triangle
ctx.fillStyle=col||'#FFF';
if(tailSide==='left'){
ctx.beginPath();ctx.moveTo(bx-6,by+12);ctx.lineTo(bx+2,by+8);ctx.lineTo(bx+2,by+16);ctx.fill();
ctx.strokeStyle='#333';ctx.beginPath();ctx.moveTo(bx-6,by+12);ctx.lineTo(bx+2,by+8);ctx.stroke();
ctx.beginPath();ctx.moveTo(bx-6,by+12);ctx.lineTo(bx+2,by+16);ctx.stroke();
}else{
ctx.beginPath();ctx.moveTo(bx+tw+6,by+12);ctx.lineTo(bx+tw-2,by+8);ctx.lineTo(bx+tw-2,by+16);ctx.fill();
ctx.strokeStyle='#333';ctx.beginPath();ctx.moveTo(bx+tw+6,by+12);ctx.lineTo(bx+tw-2,by+8);ctx.stroke();
ctx.beginPath();ctx.moveTo(bx+tw+6,by+12);ctx.lineTo(bx+tw-2,by+16);ctx.stroke();
}
// Text
ctx.fillStyle='#333';ctx.font='5px "Press Start 2P",monospace';
ctx.textAlign='left';ctx.fillText(text,bx+8,by+13);
}

function hslToHex(h,s,l){h/=360;s/=100;l/=100;let a=s*Math.min(l,1-l);let f=(n)=>{let k=(n+h*12)%12;let c=l-a*Math.max(Math.min(k-3,9-k,1),-1);return Math.round(255*c).toString(16).padStart(2,'0');};return '#'+f(0)+f(8)+f(4);}
function getSk(){let s=SKINS[save.equipSkin]||SKINS.classic;if(s.rainbow){let h=(Date.now()/15)%360;return{body:hslToHex(h,80,50),bodyD:hslToHex(h,80,35),bodyL:hslToHex(h,70,60),sn:hslToHex((h+40)%360,70,65),name:'Rainbow',cost:200,rainbow:1};}return s;}

function spawnObs(){
let types=(LEVELS[save.equipLevel]||LEVELS.farm).obs;
let avail=wave<2?[types[0],types[3]]:wave<3?[types[0],types[1],types[3]]:types;
let tp=avail[Math.floor(Math.random()*avail.length)];
// Seasonal event: 30% chance to replace with seasonal obstacle
if(currentSeason!=='none'&&SEASON_DATA[currentSeason].obs&&Math.random()<0.3){
let sObs=SEASON_DATA[currentSeason].obs;
tp=sObs[Math.floor(Math.random()*sObs.length)];
}
let o={x:W+20,type:tp};
if(slowTypes.includes(tp)){o.w=60;o.h=4;o.solid=0;}
else if(['hay_small','cactus','rock','log','mushroom','snowdrift','crab','ash_pile','gummy','asteroid','pumpkin_a','leaf_pile','spider','snowball','egg','shell','butterfly'].includes(tp)){o.w=28;o.h=20;o.solid=1;}
else{o.w=28;o.h=40;o.solid=1;}
obs.push(o);waveObsC++;

function bpRewardLabel(str){
if(!str)return'---';

return str.toUpperCase();
}
function bpRewardColor(str){
if(!str)return'#444';
if(str.includes('shoes'))return'#FFD700';
if(str.startsWith('skin:')){let k=str.split(':')[1];return SKINS[k]&&SKINS[k].bp?'#FF1493':'#9B59B6';}

return'#FFF';
}
function claimBPReward(str){

TS();

// Color filter overlay function
function applyColorFilter(x,y,w,h){
if(save.colorFilter==='none')return;
ctx.globalAlpha=0.3;
if(save.colorFilter==='warm'){ctx.fillStyle='#FF8C00';ctx.fillRect(x,y,w,h);}
else if(save.colorFilter==='cool'){ctx.fillStyle='#4169E1';ctx.fillRect(x,y,w,h);}
else if(save.colorFilter==='high contrast'){ctx.fillStyle='#000';ctx.fillRect(x,y,w,h);ctx.globalAlpha=0.15;ctx.fillStyle='#FFF';ctx.fillRect(x,y,w,h);}
else if(save.colorFilter==='grayscale'){ctx.fillStyle='#808080';ctx.fillRect(x,y,w,h);}
ctx.globalAlpha=1;
}

}

if(nearMissCount>0){ctx.fillStyle='#00FFFF';ctx.fillText('NEAR MISSES: '+nearMissCount,W/2,H/2+(bestCombo>2?20:6));}
ctx.textAlign='left';
btn(W/2-130,H/2+18,120,30,'HOME','#E24B4A','#000','go_home');
btn(W/2+10,H/2+18,120,30,'RETRY','#4A90D9','#000','retry');
ctx.globalAlpha=1;
}

/* ========== GAME LOGIC ========== */
function checkAch(){if(save.gamesPlayed>=1)save.achievements.first_game=1;if(save.bestWave>=5)save.achievements.wave5=1;if(save.bestWave>=10)save.achievements.wave10=1;if(save.totalShoes>=100)save.achievements.collect100=1;}

function startGame(race){
isRace=race?1:0;raceFinished=0;raceWon=0;state='play';
score=0;points=0;runShoes=0;combo=0;comboTimer=0;bestCombo=0;comboFlash=[];
// Apply skin stats
let sk=SKINS[save.equipSkin]||SKINS.classic;
let spdBonus=sk.spd||0,jmpBonus=sk.jmp||0,magBonus=sk.mag||0;
wave=1;speed=baseSpeed+spdBonus;speedBoost=0;boostTimer=0;
lives=3+shopExtra;shieldActive=shopShield;magnetActive=shopMagnet;magnetTimer=shopMagnet?15:0;
waveObsC=0;waveTarget=8;obs=[];shoes=[];parts=[];trailParts=[];gameOverAlpha=0;respawnFlash=0;screenShake=0;
nearMissCount=0;nearMissFlash=0;
hr.x=90;hr.y=GY;hr.vy=0;hr.grounded=1;hr.jumps=0;hr.inv=1;hr.mudT=0;
hr.jmpBonus=jmpBonus;hr.magBonus=magBonus;
save.gamesPlayed++;shopShield=0;shopMagnet=0;shopExtra=0;
if(isRace)initOpp();
resumeAudio();playMusic('play');
}

function endGame(){
save.totalShoes+=runShoes;
save.totalPoints+=points;
if(score>save.highScore)save.highScore=score;
if(wave>save.bestWave)save.bestWave=wave;
addXP(Math.floor(score/10)+wave*5);
checkAch();checkDailies(score,wave,runShoes);
TS();state='gameover';gameOverAlpha=0;
sfxDeath();playMusic('gameover');
}

function update(){
if(state==='respawning'){respawnTimer++;if(respawnTimer>=60){hr.y=GY;hr.vy=0;hr.grounded=1;hr.jumps=0;hr.inv=2;hr.mudT=0;obs=[];respawnTimer=0;respawnFlash=40;state='play';}return;}
if(state!=='play')return;
let spd=(speed+speedBoost)*(hr.mudT>0?0.5:1);groundX=(groundX+spd)%32;
hr.ft++;if(hr.ft>3){hr.fr++;hr.ft=0;}
if(hr.inv>0)hr.inv-=1/60;if(hr.mudT>0)hr.mudT-=1/60;
if(boostTimer>0){boostTimer-=1/60;if(boostTimer<=0)speedBoost=0;}
if(respawnFlash>0)respawnFlash--;
if(magnetActive){magnetTimer-=1/60;if(magnetTimer<=0)magnetActive=0;}
if(screenShake>0)screenShake-=0.5;
// Combo decay
if(comboTimer>0){comboTimer--;if(comboTimer<=0){combo=0;}}
comboFlash=comboFlash.filter(f=>{f.life--;return f.life>0;});

if(!hr.grounded){hr.vy+=GRAV;hr.y+=hr.vy;if(hr.y>=GY){hr.y=GY;hr.vy=0;hr.grounded=1;hr.jumps=0;}}
// Trail particles
if(hr.ft%3===0){let sk2=getSk();let tc=sk2.trail||'#8B6843';
if(tc==='rainbow'){tc=hslToHex((Date.now()/10)%360,80,60);}
trailParts.push({x:hr.x-4,y:hr.y-8+Math.random()*10,sz:2+Math.random()*3,life:20+Math.random()*15,col:tc,vy:-0.3-Math.random()*0.5});}
for(let i=trailParts.length-1;i>=0;i--){let t=trailParts[i];t.x-=spd*0.5;t.life--;t.y+=t.vy;if(t.life<=0)trailParts.splice(i,1);}
if(nearMissFlash>0)nearMissFlash--;
nextOD-=spd;if(nextOD<=0&&waveObsC<waveTarget){spawnObs();nextOD=130+Math.random()*160;}
nextSD-=spd;if(nextSD<=0){spawnShoe();nextSD=200+Math.random()*200;}

for(let i=obs.length-1;i>=0;i--){
let o=obs[i];o.x-=spd;
if(o.x+o.w<0){
// Cleared obstacle!
if(o.solid){
combo++;comboTimer=90;
if(combo>bestCombo)bestCombo=combo;
let pts=10*Math.min(combo,5);
points+=pts;score+=pts;
if(combo>=3){addComboFlash('x'+combo+'!',hr.x+24,hr.y-50-Math.random()*10,combo>=5?'#FF4500':'#FFD700');sfxCombo();}
}
obs.splice(i,1);continue;
}
if(o.solid&&hr.inv<=0&&collides(hr,o)){
if(shieldActive){shieldActive=0;hr.inv=1;addP(hr.x+20,hr.y-18,'#4A90D9',15);sfxHit();}
else{lives--;combo=0;comboTimer=0;addP(hr.x+20,hr.y-18,'#FF4444',14);sfxHit();
if(lives<=0)endGame();
else{state='respawning';respawnTimer=0;}}
}
// Near-miss detection
if(o.solid&&!o.nearMissed&&hr.inv<=0){
let gap=4;
let nearX=hr.x<o.x+o.w+gap&&hr.x+hr.w>o.x-gap;
let nearY=hr.y-hr.h<GY+gap&&hr.y>GY-o.h-gap;
let missed=!collides(hr,o);
if(nearX&&nearY&&missed&&o.x<hr.x+hr.w&&o.x+o.w>hr.x-10){
o.nearMissed=1;nearMissCount++;
let bonus=25;points+=bonus;score+=bonus;
addComboFlash('CLOSE! +'+bonus,hr.x+24,hr.y-60,'#00FFFF');
nearMissFlash=15;
sfxCollect();
}}
if(!o.solid&&slowTypes.includes(o.type)&&hr.x+hr.w>o.x&&hr.x<o.x+o.w&&hr.grounded)hr.mudT=0.5;
}

for(let i=shoes.length-1;i>=0;i--){
let s=shoes[i];s.x-=spd;s.y+=Math.sin(Date.now()*0.005+i)*0.3;
if(magnetActive){let dx=hr.x+24-s.x,dy=(hr.y-20)-s.y;if(Math.sqrt(dx*dx+dy*dy)<130+(hr.magBonus||0)){s.x+=dx*0.1;s.y+=dy*0.1;}}
if(s.x<-20){shoes.splice(i,1);continue;}
if(collidesS(hr,s)){
if(s.type==='boost'){speedBoost=1.5;boostTimer=4;addP(s.x,s.y,'#FF4500',8);}
else{runShoes+=10;score+=10;points+=3;addP(s.x,s.y,'#FFD700',6);addComboFlash('+10 +3pts',s.x,s.y,'#FFD700');sfxCollect();}
shoes.splice(i,1);
}}

for(let i=parts.length-1;i>=0;i--){let p=parts[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.15;p.life--;if(p.life<=0)parts.splice(i,1);}
clouds.forEach(c=>{c.x-=c.s*0.4;if(c.x+c.w<0){c.x=W+20;c.y=12+Math.random()*60;}});

if(isRace){
let myP=((wave-1)+(waveObsC/Math.max(waveTarget,1)))/raceWaves;
opponents.forEach(op=>{if(!op.finished&&!op.dead){
// AI progress tied to player progress - they advance at similar rate with variance
let targetSpeed=myP/Math.max(Date.now()-op.startTime||1,1);
op.progress+=op.speed/60/raceWaves;
// Rubber banding - if AI is too far ahead, slow down. If behind, speed up slightly
if(op.progress>myP+0.15)op.progress-=0.001;
if(op.progress<myP-0.1)op.progress+=0.0005;
// Ghost horse jumping
if(!op.jumping&&Math.random()<0.04){op.jumping=1;op.ghostVY=-7;}
if(op.jumping){op.ghostVY+=0.4;op.ghostY+=op.ghostVY;if(op.ghostY>=GY){op.ghostY=GY;op.jumping=0;op.ghostVY=0;}}
// Ghost X position reflects how far ahead/behind AI is compared to player
let diff=(op.progress-myP)*500;
op.ghostX=hr.x+diff+Math.sin(Date.now()*0.002+op.speed*10)*8;
// Clamp ghost to screen
op.ghostX=Math.max(10,Math.min(W-60,op.ghostX));
if(Math.random()<0.002)op.dead=1;if(op.progress>=1)op.finished=1;}});
if(myP>=1&&!raceFinished){raceFinished=1;raceWon=!opponents.some(o=>o.finished)?1:0;if(raceWon){save.achievements.win_race=1;points+=500;addComboFlash('+500 WIN!',W/2,H/2,'#4ADE80');}endGame();return;}if(opponents.some(o=>o.finished)&&!raceFinished){raceFinished=1;raceWon=0;endGame();return;}}

if(waveObsC>=waveTarget&&obs.length===0){
wave++;
let waveBonus=wave*100;points+=waveBonus;score+=waveBonus;
addComboFlash('WAVE '+wave+' +'+waveBonus,W/2,H/2-30,'#4ADE80');sfxWave();
waveTarget=Math.min(8+wave*2,22);waveObsC=0;speed=baseSpeed+wave*0.18;
if(!isRace||wave<=raceWaves){state='waveBreak';waveTimer=70;}
}
}

/* ========== DRAW ========== */
function draw(){
buttons=[];if(state==='name')return;
let sx=0,sy=0;
ctx.save();ctx.translate(sx,sy);

if(state==='home')drawHome();
else if(state==='shop')drawShop();
else if(state==='profile')drawProfile();
else if(state==='inventory')drawInventory();
else if(state==='settings')drawSettings();
else if(state==='party')drawParty();
else if(state==='dailies')drawDailies();
else if(state==='battlepass')drawBattlePass();
else{
drawBg();obs.forEach(drawObs);shoes.forEach(drawShoe);
// Draw ghost opponent horses during race
if(isRace){opponents.forEach((op,idx)=>{
if(op.dead||op.finished)return;
ctx.globalAlpha=0.35;
let gx=op.ghostX,gy=op.ghostY,gb=gy-42+(Math.sin(Date.now()*0.003+idx)*2);
let gc=idx===0?{body:'#9B59B6',bodyD:'#7A3E94',bodyL:'#B070D0',sn:'#C890E0',mane:'#DDA0DD',tail:'#DDA0DD'}:{body:'#E67E22',bodyD:'#C06010',bodyL:'#F09838',sn:'#F0B060',mane:'#FFD700',tail:'#FFD700'};
// Ghost legs
let glo=Math.sin(Date.now()*0.004+idx)*5;
px(gx+10,gb+24,4,14+glo,gc.bodyD);px(gx+16,gb+24,4,14-glo,gc.bodyD);
px(gx+30,gb+24,4,14-glo,gc.bodyD);px(gx+36,gb+24,4,14+glo,gc.bodyD);
// Ghost tail
let gtB=Math.sin(Date.now()*0.002+idx)*3;
px(gx+6,gb+8+gtB,4,4,gc.tail);px(gx+3,gb+10+gtB,4,6,gc.tail);
px(gx+0,gb+12+gtB,4,8,gc.tail);px(gx-3,gb+14+gtB,4,8,gc.tail);
// Ghost body
px(gx+8,gb+8,32,18,gc.body);px(gx+10,gb+10,28,14,gc.bodyL);
// Ghost neck+head
px(gx+34,gb+2,10,14,gc.body);px(gx+38,gb-4,14,14,gc.body);
px(gx+46,gb-6,10,8,gc.body);px(gx+50,gb+0,6,5,gc.sn);
px(gx+46,gb-2,3,3,'#000');
// Ghost ears
px(gx+42,gb-10,4,8,gc.body);px(gx+46,gb-12,4,8,gc.body);
// Ghost mane
px(gx+40,gb-8,4,6,gc.mane);px(gx+36,gb-6,4,5,gc.mane);
px(gx+32,gb-4,4,4,gc.mane);px(gx+32,gb+2,4,6,gc.mane);
// Name tag
ctx.font='4px "Press Start 2P",monospace';ctx.fillStyle=idx===0?'#9B59B6':'#E67E22';
ctx.textAlign='center';ctx.fillText(op.name,gx+24,gb-16);ctx.textAlign='left';
ctx.globalAlpha=1;
});}
if(state!=='gameover')drawHorse(hr);
parts.forEach(p=>{ctx.globalAlpha=p.life/50;px(p.x,p.y,p.sz,p.sz,p.col);});ctx.globalAlpha=1;
// Trail particles
trailParts.forEach(t=>{ctx.globalAlpha=t.life/35*0.6;px(t.x,t.y,t.sz,t.sz,t.col);});ctx.globalAlpha=1;
// Near-miss flash
if(nearMissFlash>0){ctx.globalAlpha=nearMissFlash/15*0.15;ctx.fillStyle='#00FFFF';ctx.fillRect(0,0,W,H);ctx.globalAlpha=1;}
drawComboFlashes();drawRaceBar();drawHUD();
if(respawnFlash>0&&!save.reduceFlash){ctx.globalAlpha=respawnFlash/40*0.35;ctx.fillStyle='#FFF';ctx.fillRect(0,0,W,H);ctx.globalAlpha=1;}
if(state==='respawning'){ctx.font='10px "Press Start 2P",monospace';ctx.textAlign='center';ctx.fillStyle='#FFF';ctx.shadowColor='rgba(0,0,0,0.8)';ctx.shadowBlur=4;ctx.fillText('RESPAWNING...',W/2,H/2);ctx.textAlign='left';ctx.shadowBlur=0;}
if(state==='waveBreak'){ctx.globalAlpha=0.7;ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(W/2-60,H/2-16,120,28);ctx.globalAlpha=1;ctx.font='8px "Press Start 2P",monospace';ctx.textAlign='center';ctx.fillStyle='#FFF';ctx.fillText('WAVE '+wave,W/2,H/2+2);ctx.textAlign='left';}
applyGameFilter();
if(state==='paused')drawPause();
if(state==='gameover')drawGameOver();
}
if(inputActive){ctx.globalAlpha=0.7;ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);ctx.globalAlpha=1;ctx.fillStyle='#1A1A30';rr(W/2-130,H/2-35,260,70,8);ctx.fill();ctx.font='7px "Press Start 2P",monospace';ctx.fillStyle='#AAA';ctx.textAlign='center';ctx.fillText(inputActive==='code'?'ROOM CODE:':'FRIEND NAME:',W/2,H/2-14);ctx.fillStyle='#0E0E1E';rr(W/2-70,H/2-6,140,22,4);ctx.fill();ctx.font='8px "Press Start 2P",monospace';ctx.fillStyle='#FFF';ctx.fillText(inputText+(Math.floor(Date.now()/500)%2===0?'|':''),W/2,H/2+8);ctx.font='7px "Press Start 2P",monospace';ctx.fillStyle='#666';ctx.fillText('ENTER=OK  ESC=CANCEL',W/2,H/2+24);ctx.textAlign='left';}
ctx.restore();
}

/* ========== CLICK HANDLER ========== */
function handleClick(mx,my){for(let b of buttons){if(mx>=b.x&&mx<=b.x+b.w&&my>=b.y&&my<=b.y+b.h){let id=b.id;
if(id==='play')startGame(0);else if(id==='shop'){state='shop';shopTab='skins';playMusic('shop');}else if(id==='inventory'){state='inventory';invTab='skins';playMusic('shop');}else if(id==='profile'){state='profile';playMusic('shop');}else if(id==='settings'){state='settings';settingsInput='';playMusic('shop');}else if(id==='party'){state='party';partyTab='create';partyCode='';partyPlayers=[];playMusic('menu');}else if(id==='dailies'){state='dailies';playMusic('shop');}else if(id==='battlepass'){state='battlepass';bpTab='free';playMusic('shop');}
else if(id==='bp_free')bpTab='free';else if(id==='bp_prem')bpTab='prem';
else if(id==='buy_premium'&&save.totalShoes>=500){save.totalShoes-=500;save.bpPremium=1;TS();}
else if(id.startsWith('claim_bp_')){let lvl=parseInt(id.replace('claim_bp_',''));let track=bpTab==='free'?BP_FREE:BP_PREM;let claimed=bpTab==='free'?save.bpClaimed:save.bpPremClaimed;if(save.bpLevel>=lvl&&!claimed.includes(lvl)&&track[lvl]){claimBPReward(track[lvl]);claimed.push(lvl);TS();}}
else if(id==='back'||id==='go_home'){state='home';isRace=0;playMusic('menu');}else if(id==='retry')startGame(isRace);else if(id==='pause'){prevState=state;state='paused';if(musicGain)musicGain.gain.value=0.1;}else if(id==='resume'){state=prevState||'play';if(musicGain)musicGain.gain.value=0.3;}else if(id==='pause_home'){state='home';isRace=0;playMusic('menu');}
else if(id.startsWith('tab_'))shopTab=id.replace('tab_','');
else if(id.startsWith('party_'))partyTab=id.replace('party_','');
else if(id.startsWith('inv_'))invTab=id.replace('inv_','');
else if(id==='reset_data'){save=FS();save.name=document.getElementById('inName').value.trim()||'Player';TS();}
else if(id.startsWith('avatar_')){save.avatar=parseInt(id.replace('avatar_',''));TS();}
else if(id==='toggle_music'){musicEnabled=musicEnabled?0:1;if(musicEnabled){if(masterGain)masterGain.gain.value=0.4;resumeAudio();if(state==='play')playMusic('play');else if(state==='home')playMusic('menu');else playMusic('shop');}else{stopMusic();}}
else if(id==='toggle_sfx'){sfxEnabled=sfxEnabled?0:1;}
else if(id==='toggle_flash'){save.reduceFlash=save.reduceFlash?0:1;TS();}
else if(id==='cycle_filter'){let filters=['none','warm','cool','high contrast','grayscale'];let idx=filters.indexOf(save.colorFilter);idx=(idx+1)%filters.length;save.colorFilter=filters[idx];TS();}
else if(id==='settings_name'){settingsInput='name';settingsText=save.name;}
else if(id==='confirm_name'){if(settingsInput==='name'&&settingsText.trim()){save.name=settingsText.trim();TS();}settingsInput='';settingsText='';}
else if(id==='more'){}
else if(id==='input_code'){inputActive='code';inputText='';}
else if(id==='race_1v1'){raceMode=1;}
else if(id==='race_1v2'){raceMode=2;}
else if(id==='start_race'||id==='quick_match'){partyPlayers=raceMode===1?[save.name,'Dusty']:[save.name,'Dusty','Blaze'];startGame(1);}
else if(id==='join_room'&&inputText.length>=4){partyTab='create';partyCode=inputText.toUpperCase();partyPlayers=[save.name,'Host'];inputActive='';inputText='';}
else if(id.startsWith('buy_skin_')){let k=id.replace('buy_skin_','');if(save.totalShoes>=SKINS[k].cost){save.totalShoes-=SKINS[k].cost;save.ownedSkins.push(k);save.equipSkin=k;save.achievements.buy_first=1;TS();}}
else if(id.startsWith('equip_skin_')){save.equipSkin=id.replace('equip_skin_','');TS();}
else if(id.startsWith('buy_saddle_')){let k=id.replace('buy_saddle_','');if(save.totalShoes>=SADDLES[k].cost){save.totalShoes-=SADDLES[k].cost;save.ownedSaddles.push(k);save.equipSaddle=k;save.achievements.buy_first=1;TS();}}
else if(id.startsWith('equip_saddle_')){save.equipSaddle=id.replace('equip_saddle_','');TS();}
else if(id.startsWith('buy_level_')){let k=id.replace('buy_level_','');if(save.totalShoes>=LEVELS[k].cost){save.totalShoes-=LEVELS[k].cost;save.ownedLevels.push(k);save.equipLevel=k;save.achievements.buy_first=1;TS();}}
else if(id.startsWith('equip_level_')){save.equipLevel=id.replace('equip_level_','');TS();}
else if(id==='buy_item_extra_life'&&save.totalShoes>=100){save.totalShoes-=100;shopExtra=1;save.achievements.buy_first=1;TS();}
else if(id==='buy_item_shield'&&save.totalShoes>=80){save.totalShoes-=80;shopShield=1;save.achievements.buy_first=1;TS();}
else if(id==='buy_item_magnet'&&save.totalShoes>=60){save.totalShoes-=60;shopMagnet=1;save.achievements.buy_first=1;TS();}
return true;}}return false;}

function doJump(){if(hr.jumps<hr.maxJ){hr.vy=JV-(hr.jmpBonus||0);hr.grounded=0;hr.jumps++;addP(hr.x+20,hr.y,'#5DA03A',4);sfxJump();}}
cn.addEventListener('click',e=>{if(state==='name')return;let r=cn.getBoundingClientRect(),mx=((e.clientX-r.left)/r.width)*W,my=((e.clientY-r.top)/r.height)*H;if(handleClick(mx,my))return;if(inputActive){inputActive='';return;}if(state==='play'||state==='waveBreak')doJump();});
cn.addEventListener('touchstart',e=>{e.preventDefault();if(state==='name')return;let r=cn.getBoundingClientRect(),mx=((e.touches[0].clientX-r.left)/r.width)*W,my=((e.touches[0].clientY-r.top)/r.height)*H;if(handleClick(mx,my))return;if(inputActive){inputActive='';return;}if(state==='play'||state==='waveBreak')doJump();},{passive:false});
document.addEventListener('keydown',e=>{if(state==='name')return;
if(settingsInput==='name'){if(e.key==='Escape'){settingsInput='';return;}if(e.key==='Enter'){if(settingsText.trim()){save.name=settingsText.trim();TS();}settingsInput='';return;}if(e.key==='Backspace'){e.preventDefault();settingsText=settingsText.slice(0,-1);return;}if(e.key.length===1&&settingsText.length<12){settingsText+=e.key;}return;}
if(inputActive){if(e.key==='Escape'){inputActive='';return;}if(e.key==='Enter'){inputActive='';return;}if(e.key==='Backspace'){inputText=inputText.slice(0,-1);return;}if(e.key.length===1&&inputText.length<12){inputText+=e.key;}return;}if(e.code==='Space'){e.preventDefault();if(state==='home')startGame(0);else if(state==='play'||state==='waveBreak')doJump();}if((e.code==='KeyP'||e.code==='Escape')&&(state==='play'||state==='paused')){if(state==='paused')state=prevState||'play';else{prevState=state;state='paused';}}});

function loop(){if(state==='waveBreak'){waveTimer--;if(waveTimer<=0)state='play';}update();draw();requestAnimationFrame(loop);}
loop();
</script>
